send_text:
  name: Send text to Feishu
  description: Send a custom text message to a Feishu receive_id.
  fields:
    receive_id:
      required: true
      example: oc_xxxxx
      selector:
        text:
    receive_id_type:
      required: false
      default: chat_id
      selector:
        select:
          options:
            - chat_id
            - open_id
            - user_id
            - union_id
    text:
      required: true
      selector:
        text:
